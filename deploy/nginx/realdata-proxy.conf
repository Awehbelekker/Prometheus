# Nginx reverse proxy for PROMETHEUS
# - / -> backend (8000)
# - /real-data/ -> real data API (8002)

upstream backend {
  server 127.0.0.1:8000;
}

upstream realdata {
  server 127.0.0.1:8002;
}

server {
  listen 80;
  server_name prometheus-trade.local;  # change to your domain
  client_max_body_size 50m;

  # Primary backend: APIs and optionally frontend
  location / {
    proxy_pass http://backend;
    proxy_set_header Host $host;
    proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    proxy_set_header X-Forwarded-Proto $scheme;
    proxy_http_version 1.1;
    proxy_read_timeout 60s;
  }

  # Real Data API routed by path prefix
  location /real-data/ {
    proxy_pass http://realdata/;        # preserves path after /real-data/
    proxy_set_header Host $host;
    proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    proxy_set_header X-Forwarded-Proto $scheme;
    proxy_http_version 1.1;
    proxy_buffering off;                # optional for streaming
    proxy_read_timeout 120s;
  }
}

