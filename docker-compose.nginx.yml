version: "3.9"

services:
  backend:
    build:
      context: .
      dockerfile: docker/Dockerfile.backend
    environment:
      - ENABLE_REALDATA_PROXY=1
      - REALDATA_API_BASE=http://realdata:8002
    ports:
      - "8000:8000"
    depends_on:
      - realdata

  realdata:
    build:
      context: .
      dockerfile: docker/Dockerfile.realdata
    ports:
      - "8002:8002"

  nginx:
    image: nginx:alpine
    depends_on:
      - backend
      - realdata
    ports:
      - "8080:80"
    volumes:
      - ./deploy/nginx/realdata-proxy.conf:/etc/nginx/conf.d/default.conf:ro

