<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100" width="100" height="100">
  <defs>
    <linearGradient id="logoGradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#00d4ff"/>
      <stop offset="50%" stop-color="#ff6b35"/>
      <stop offset="100%" stop-color="#9c27b0"/>
    </linearGradient>
    <filter id="glow" x="-50%" y="-50%" width="200%" height="200%">
      <feGaussianBlur stdDeviation="3" result="coloredBlur"/>
      <feMerge> 
        <feMergeNode in="coloredBlur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>
  
  <!-- Background circle -->
  <circle cx="50" cy="50" r="45" fill="none" stroke="url(#logoGradient)" stroke-width="3" filter="url(#glow)"/>
  
  <!-- Inner design -->
  <circle cx="50" cy="50" r="30" fill="none" stroke="url(#logoGradient)" stroke-width="2" opacity="0.7"/>
  
  <!-- Pi symbol -->
  <text x="50" y="60" text-anchor="middle" font-family="Arial Black" font-weight="900" font-size="32" fill="url(#logoGradient)" filter="url(#glow)">Π</text>
  
  <!-- Neural network nodes -->
  <circle cx="30" cy="30" r="3" fill="#00d4ff" opacity="0.8"/>
  <circle cx="70" cy="30" r="3" fill="#ff6b35" opacity="0.8"/>
  <circle cx="30" cy="70" r="3" fill="#9c27b0" opacity="0.8"/>
  <circle cx="70" cy="70" r="3" fill="#00d4ff" opacity="0.8"/>
  
  <!-- Connection lines -->
  <line x1="30" y1="30" x2="50" y2="50" stroke="url(#logoGradient)" stroke-width="1" opacity="0.5"/>
  <line x1="70" y1="30" x2="50" y2="50" stroke="url(#logoGradient)" stroke-width="1" opacity="0.5"/>
  <line x1="30" y1="70" x2="50" y2="50" stroke="url(#logoGradient)" stroke-width="1" opacity="0.5"/>
  <line x1="70" y1="70" x2="50" y2="50" stroke="url(#logoGradient)" stroke-width="1" opacity="0.5"/>
</svg>
